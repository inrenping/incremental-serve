name: CI/CD for Incremental Serve

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_EMAIL_FROM: ${{ secrets.RESEND_EMAIL_FROM }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GIT_HUB_CLIENT_ID: ${{ secrets.GIT_HUB_CLIENT_ID }}
      GIT_HUB_CLIENT_SECRET: ${{ secrets.GIT_HUB_CLIENT_SECRET }}
    strategy:
      matrix:
        python-version: [ 3.11, 3.12 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests || echo "No tests found, skipping..."

  deploy:
    name: Deploy to remote server
    runs-on: ubuntu-latest
    needs: test
    # 仅在推送到 master 分支时触发部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_EMAIL_FROM: ${{ secrets.RESEND_EMAIL_FROM }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GIT_HUB_CLIENT_ID: ${{ secrets.GIT_HUB_CLIENT_ID }}
          GIT_HUB_CLIENT_SECRET: ${{ secrets.GIT_HUB_CLIENT_SECRET }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: DATABASE_URL,SECRET_KEY,RESEND_API_KEY,RESEND_EMAIL_FROM,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GIT_HUB_CLIENT_ID,GIT_HUB_CLIENT_SECRET
          script: |
            echo "Connected to $(hostname)"
            cd /var/www/incremental-serve || exit 1

            # 1. 拉取最新代码
            git pull origin master

            # 2. 更新环境变量 (.env 文件)
            cat <<EOF > .env
            DATABASE_URL=$DATABASE_URL
            SECRET_KEY=$SECRET_KEY
            RESEND_API_KEY=$RESEND_API_KEY
            RESEND_EMAIL_FROM=$RESEND_EMAIL_FROM
            GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
            GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET
            GIT_HUB_CLIENT_ID=$GIT_HUB_CLIENT_ID
            GIT_HUB_CLIENT_SECRET=$GIT_HUB_CLIENT_SECRET
            EOF

            # 3. 安装依赖 (使用你已有的 venv)
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # 4. 重启系统服务
            # 确保你之前已经配置了 sudo visudo 免密执行该命令
            sudo systemctl restart incremental-serve.service
