name: 定时接口调用

# 定义触发事件
on:
  schedule:
    # 每小时执行一次
    - cron: "0 * * * *"
  workflow_dispatch: # 可手动触发

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: 刷新 Garmin 活动计数
        run: |
          echo "开始刷新 Garmin 活动计数..."
          RESPONSE=$(curl -s -X GET "https://i.incremental.icu/api/v1/garmin/refreshGarminActivityCount" -H "Content-Type: application/json")
          echo "接口返回: $RESPONSE"

      - name: 同步每日心率（昨天和今天）
        run: |
          YESTERDAY=$(date -d "yesterday" '+%Y-%m-%d')
          TODAY=$(date '+%Y-%m-%d')
          echo "同步昨天 ($YESTERDAY) 心率..."
          RESPONSE=$(curl -s -X GET "https://i.incremental.icu/api/v1/garmin/syncDailyHeartRate?date=$YESTERDAY" -H "Content-Type: application/json")
          echo "接口返回: $RESPONSE"
          echo "同步今天 ($TODAY) 心率..."
          RESPONSE=$(curl -s -X GET "https://i.incremental.icu/api/v1/garmin/syncDailyHeartRate?date=$TODAY" -H "Content-Type: application/json")
          echo "接口返回: $RESPONSE"

      - name: 定时备份 FIT 文件到存储
        run: |
          echo "开始备份 FIT 文件到对象存储..."
          RESPONSE=$(curl -s -X GET "https://i.incremental.icu/api/v1/base/batchUploadFitToStorage?limit=10" -H "Content-Type: application/json")
          echo "接口返回: $RESPONSE"

      - name: 定时任务执行
        run: |
          echo "开始执行定时任务..."
          RESPONSE=$(curl -s -X POST "https://i.incremental.icu/api/v1/task/cron-execute" -H "Content-Type: application/json")
          echo "接口返回: $RESPONSE"
